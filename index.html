<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supervisão Ambiental – PWA</title>

  <meta name="theme-color" content="#0C3C78">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-gray-50 text-gray-900">

<div id="message-box" class="fixed top-0 left-1/2 transform -translate-x-1/2 mt-4 p-3 text-white rounded-lg shadow-lg hidden z-50"></div>

<section id="screen-cadastro" class="min-h-screen"></section>
<section id="screen-select-roteiro" class="hidden min-h-screen"></section>
<section id="screen-formulario" class="hidden min-h-screen"></section>
<section id="screen-final" class="hidden min-h-screen"></section>

<div id="camera-modal" class="fixed inset-0 bg-black z-[100] hidden flex flex-col"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

<script src="indexedDB.js"></script>

<<script type="module">
    // Ajuste dos caminhos para a pasta 'roteiros'
    import { ROTEIRO_GERAL } from './roteiros/roteiro_geral.js';
    import { ROTEIRO_PGE } from './roteiros/roteiro_pge.js';
    import { ROTEIRO_AA } from './roteiros/roteiro_aa.js';

    window.ROTEIROS_DATA = {
        geral: ROTEIRO_GERAL,
        pge: ROTEIRO_PGE,
        aa: ROTEIRO_AA
    };

    // Importa o app.js como módulo para aceitar os 'exports' dos roteiros
    import('./app.js').then(module => {
        // Vincula funções necessárias ao window para uso em atributos onclick de HTML
        window.abrirCamera = module.abrirCamera; 
        console.log("App.js e roteiros carregados com sucesso.");
    });
</script>

<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("service-worker.js")
                .then(reg => console.log("Service Worker registrado com sucesso:", reg.scope))
                .catch(err => console.error("Falha ao registrar Service Worker:", err));
        });
    }
</script>

</body>
</html>
