<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supervisão Ambiental – PWA</title>

  <meta name="theme-color" content="#0C3C78">
  <meta name="mobile-web-app-capable" content="yes">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div id="message-box" class="fixed top-0 left-1/2 transform -translate-x-1/2 mt-4 p-3 text-white rounded-lg shadow-lg hidden z-50"></div>

<section id="screen-cadastro">
    </section>
<section id="screen-select-roteiro" class="hidden"></section>
<section id="screen-formulario" class="hidden"></section>
<section id="screen-final" class="hidden"></section>

<div id="camera-modal" class="hidden"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

<script src="indexedDB.js"></script>

<script type="module">
    // Importa os roteiros gerados pelo R
    import { ROTEIRO_GERAL } from './roteiro_geral.js';
    import { ROTEIRO_PGE } from './roteiro_pge.js';
    import { ROTEIRO_AA } from './roteiro_aa.js';

    // Disponibiliza globalmente para que o app.js (não-módulo) consiga ler
    window.ROTEIROS_DATA = {
        geral: ROTEIRO_GERAL,
        pge: ROTEIRO_PGE,
        aa: ROTEIRO_AA
    };

    // Garante que o app.js só execute após os dados estarem prontos
    import('./app.js').then(() => {
        console.log("App inicializado com roteiros carregados.");
    });
</script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js")
      .then(reg => console.log("SW Modular registrado"))
      .catch(err => console.log("Erro SW:", err));
  });
}
</script>

</body>
</html>
